<svg xmlns="http://www.w3.org/2000/svg" width="970" height="740" viewBox="0 0 970 740" role="img" aria-labelledby="title desc">
  <title id="title">Finished pizza shop layout</title>
  <desc id="desc">The demo project with score readouts at the top left, helper prices beside the chef and granny, and equipment along the bottom.</desc>
  <image href="pizza-shop-screengrab.png" x="0" y="0" width="970" height="740"/>

  <g font-family="Arial, sans-serif" font-weight="700" fill="#536079">
    <rect x="18" y="76" width="344" height="45" rx="7" fill="#eaf1fa" stroke="#bccbe0" stroke-width="2"/>
    <text x="36" y="107" font-size="24">pizzas per second</text>
    <rect x="264" y="84" width="80" height="30" rx="8" fill="#ffa64d" stroke="none"/>
    <text x="304" y="107" text-anchor="middle" font-size="24" font-weight="400" fill="#000000">12</text>

    <rect x="18" y="135" width="312" height="45" rx="7" fill="#eaf1fa" stroke="#bccbe0" stroke-width="2"/>
    <text x="36" y="166" font-size="24">pizzas per click</text>
    <rect x="232" y="143" width="80" height="30" rx="8" fill="#ffa64d" stroke="none"/>
    <text x="272" y="166" text-anchor="middle" font-size="24" font-weight="400" fill="#000000">24</text>

    <rect x="438" y="237" width="250" height="45" rx="7" fill="#eaf1fa" stroke="#bccbe0" stroke-width="2"/>
    <text x="456" y="268" font-size="23">helper price</text>
    <rect x="590" y="245" width="80" height="30" rx="8" fill="#ffa64d" stroke="none"/>
    <text x="630" y="268" text-anchor="middle" font-size="24" font-weight="400" fill="#000000">67</text>

    <rect x="497" y="306" width="190" height="45" rx="7" fill="#eaf1fa" stroke="#bccbe0" stroke-width="2"/>
    <text x="514" y="337" font-size="23">helpers</text>
    <rect x="590" y="314" width="80" height="30" rx="8" fill="#ffa64d" stroke="none"/>
    <text x="630" y="337" text-anchor="middle" font-size="24" font-weight="400" fill="#000000">2</text>
  </g>
</svg>
